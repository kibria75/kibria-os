<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Dark teal radial gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0D3331"/>
    </radialGradient>

    <!-- Grid pattern: subtle teal lines -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>

    <!-- Dot accent pattern -->
    <pattern id="dots" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="1.5" fill="#ffffff" fill-opacity="0.12"/>
    </pattern>

    <!-- Glow filter for logo -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Subtle dot overlay -->
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- Decorative arc top-left -->
  <circle cx="-60" cy="-60" r="400" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-opacity="0.25"/>
  <circle cx="-60" cy="-60" r="550" fill="none" stroke="#0F766E" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Decorative arc bottom-right -->
  <circle cx="1980" cy="1140" r="500" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="1980" cy="1140" r="680" fill="none" stroke="#0F766E" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Centered hexagonal mark (white) -->
  <!-- Hexagon centered at (960, 450), radius 140 -->
  <g filter="url(#glow)">
    <polygon
      points="960,310 1081,380 1081,520 960,590 839,520 839,380"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="3"
      stroke-opacity="0.9"
    />
    <!-- White "K" inside hexagon -->
    <!-- Left stem -->
    <rect x="918" y="378" width="24" height="184" fill="#FFFFFF" rx="4" opacity="0.95"/>
    <!-- Upper arm -->
    <polygon points="942,450 1008,378 1038,378 972,450" fill="#FFFFFF" opacity="0.95"/>
    <!-- Lower arm -->
    <polygon points="942,462 1008,562 1038,562 972,462" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- Wordmark: KibriaOS in white -->
  <text
    x="960" y="680"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="80"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-2"
    opacity="0.95"
  >KibriaOS</text>

  <!-- Tagline -->
  <text
    x="960" y="730"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="6"
    opacity="0.65"
  >AI-POWERED LINUX  ·  DHAKA, BANGLADESH</text>

  <!-- Bottom accent line -->
  <line x1="760" y1="760" x2="1160" y2="760" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Version stamp bottom-right -->
  <text
    x="1890" y="1060"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="14"
    fill="#FFFFFF"
    text-anchor="end"
    opacity="0.3"
    letter-spacing="1"
  >v0.2.0</text>
</svg>
